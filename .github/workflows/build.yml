# Build every board in CI inside KiCad's official Docker image (the supported
# headless-automation path — the Ubuntu PPA build of kicad-cli segfaults on
# GitHub runners). The `-full` tag bundles the stock symbol/footprint/3D
# libraries; the Espressif PCM addon is unpacked headlessly into the layout
# resolve_library.py expects, then the full make.py pipeline
# (build -> route -> render -> fab) runs under xvfb (3D renders need GL).
#
# On every push to main: builds and uploads the boards as a workflow artifact.
# On a version tag (v*): additionally publishes a GitHub release with the
# fab zips, KiCad project zips, and montages attached. Tag BEFORE building:
# the back silk of each board carries `git describe`, so boards built from a
# tag are stamped with that version.
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # publish releases

env:
  ESPRESSIF_ADDON_URL: https://github.com/espressif/kicad-libraries/releases/download/3.1.0/espressif-kicad-addon.zip

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    container:
      image: kicad/kicad:10.0-full
      options: --user root # apt-get + writable $HOME
    steps:
      - name: Install render/packaging deps
        # BEFORE checkout: without git in the container, actions/checkout
        # falls back to a tarball download and git describe (which stamps the
        # boards' back silk) would have no repo to read.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git imagemagick xvfb fonts-dejavu-core unzip zip curl ca-certificates

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags: git describe stamps the back silk

      - name: Install Espressif KiCad libraries (headless PCM install)
        run: |
          ver="$(kicad-cli version | grep -oE '^[0-9]+\.[0-9]+')"
          pkg=com_github_espressif_kicad-libraries
          root="$HOME/.local/share/kicad/${ver}/3rdparty"
          curl -sSL -o /tmp/espressif-addon.zip "$ESPRESSIF_ADDON_URL"
          unzip -q /tmp/espressif-addon.zip -d /tmp/espressif-addon
          for part in symbols footprints 3dmodels; do
            mkdir -p "$root/$part/$pkg"
            cp -R "/tmp/espressif-addon/$part/." "$root/$part/$pkg/"
          done

      - uses: astral-sh/setup-uv@v6

      - name: Restore Python env
        run: uv sync

      - name: Resolve KiCad + libraries
        # xvfb: kicad-cli segfaults with no display, even for `version`
        run: xvfb-run -a uv run python scripts/resolve_library.py

      - name: Build + route + render + fab (all boards)
        run: xvfb-run -a uv run python scripts/make.py --all

      - name: Zip the KiCad projects
        run: |
          cd out
          for d in */; do
            m="${d%/}"
            zip -qr "${m}-project.zip" "$m" -x "$m/route_debug/*" -x "$m/fab/*"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: boards
          path: |
            out/*/*-fab.zip
            out/*-project.zip
            build/montage_*.png

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*/*-fab.zip
            out/*-project.zip
            build/montage_*.png

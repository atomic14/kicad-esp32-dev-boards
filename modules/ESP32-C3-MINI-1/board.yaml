# Curated config for ESP32-C3-MINI-1. Most wiring is auto-derived from
# pinout.json + footprint geometry; this only holds the decisions that aren't.
module: ESP32-C3-MINI-1
symbol: PCM_Espressif:ESP32-C3-MINI-1
do_not_break_out: []   # no internal flash/PSRAM pins exposed on this module
overrides: {}
strapping: [2, 8, 9]      # GPIOs sampled at reset (atomic14/datasheet); unsafe for the on-board LED
input_only: []     # GPIOs with no output driver
builtin_led: GPIO7   # on-board LED -> safe GPIO pad nearest the LED on the PCB
notes: ""

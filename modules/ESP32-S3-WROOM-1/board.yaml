# Curated config for ESP32-S3-WROOM-1.
module: ESP32-S3-WROOM-1
symbol: PCM_Espressif:ESP32-S3-WROOM-1
# Internal SPI flash/PSRAM pins (octal) — must NOT be broken out.
do_not_break_out:
  - SPIDQS
  - SPIIO6
  - SPIIO7
overrides: {}
strapping: [0, 3, 45, 46]      # GPIOs sampled at reset (atomic14/datasheet); unsafe for the on-board LED
input_only: []     # GPIOs with no output driver
builtin_led: GPIO48   # on-board LED -> safe GPIO pad nearest the LED on the PCB
boot: GPIO0   # download/boot strapping pin the BOOT button pulls low
notes: "Flash/PSRAM pins on the right edge excluded from breakout."
